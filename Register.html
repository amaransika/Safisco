<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - SAFISCO</title>
    <!-- Link to the SAME CSS file as your login page -->
    <link rel="stylesheet" href="login.css"> 
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="page-wrapper">

        <!-- LEFT COLUMN: Contains header, form, and footer -->
        <div class="content-column">
            <header class="main-header">
                <div class="logo">SAFISCO</div>
            </header>

            <main class="login-form-section">
                <div class="form-wrapper">
                    <a href="#" class="cart-icon">
                        <i class="fas fa-shopping-cart"></i>
                    </a>
                    <!-- The h1 title is changed to "Sign Up" -->
                    <h1>Sign Up</h1>
                    <form action="#">
                        <div class="input-group">
                            <label for="name">Name</label>
                            <input type="text" id="name" required>
                        </div>
                        <div class="input-group">
                            <label for="email">Email or Phone Number</label>
                            <input type="text" id="email" required>
                        </div>
                        <div class="input-group">
                            <label for="password">Password</label>
                            <div class="password-wrapper">
                                <input type="password" id="password" required>
                                <i class="fas fa-eye toggle-password"></i>
                            </div>
                        </div>
                        <!-- New 'I agree' checkbox section -->
                        <div class="form-options">
                            <label class="custom-checkbox a-bit-smaller">I agree with 
                                <a href="#">Terms</a> and <a href="#">Privacy</a>
                                <input type="checkbox" id="agree" checked>
                                <span class="checkmark"></span>
                            </label>
                        </div>
                        <button type="submit" class="btn btn-primary">Sign Up</button>
                    </form>
                    <div class="separator">
                        <span>or</span>
                    </div>
                    <div class="social-login">
                        <button type="button" class="btn btn-secondary">
                            <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google logo">
                            Sign Up with Google
                        </button>
                        <button type="button" class="btn btn-secondary">
                            <i class="fa-brands fa-apple"></i>
                            Sign Up with Apple
                        </button>
                    </div>
                    <!-- Link changed to direct to Log In -->
                    <p class="signup-link">
                        Already have an account? <a href="login.html">Sign In</a>
                    </p>
                </div>
            </main>

            <footer class="main-footer">
                <p>Copyright © 2025 SAFISCO All rights reserved.</p>
                <a href="Terms.html">Terms & Conditions</a>
            </footer>
        </div>

        <!-- RIGHT COLUMN: Carousel Only -->
        <div class="branding-section">
            <div class="carousel-slides">
                <div class="slide"><img src="Images/Logo.jpeg" alt="Branding Image 1"></div>
                <div class="slide"><img src="Images/login4.png" alt="Branding Image 2"></div>
                <div class="slide"><img src="Images/login3.png" alt="Branding Image 3"></div>
                <div class="slide"><img src="Images/login1.png" alt="Branding Image 4"></div>
                <div class="slide"><img src="Images/login2.png" alt="Branding Image 5"></div>
            </div>
            <div class="quote-overlay">
                <div class="quote-container">
                    <blockquote>“The best gifts come from the heart, not the store.”</blockquote>
                    <figcaption>— Sarah Dessen</figcaption>
                </div>
                <div class="carousel-dots"></div>
            </div>
        </div>
    </div>

    <!-- The same carousel script can be used -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const slidesContainer = document.querySelector('.carousel-slides');
            const slides = document.querySelectorAll('.slide');
            const dotsContainer = document.querySelector('.carousel-dots');
            
            if (!slidesContainer || slides.length === 0) return;

            const totalSlides = slides.length;
            let currentSlide = 0;
            let slideInterval;

            for (let i = 0; i < totalSlides; i++) {
                const dot = document.createElement('span');
                dot.classList.add('dot');
                if (i === 0) dot.classList.add('active');
                
                dot.addEventListener('click', () => {
                    goToSlide(i);
                    resetInterval();
                });
                dotsContainer.appendChild(dot);
            }
            
            const dots = document.querySelectorAll('.dot');

            function goToSlide(slideIndex) {
                slidesContainer.style.transform = `translateX(-${slideIndex * (100 / totalSlides)}%)`;
                dots.forEach(dot => dot.classList.remove('active'));
                dots[slideIndex].classList.add('active');
                currentSlide = slideIndex;
            }

            function nextSlide() {
                goToSlide((currentSlide + 1) % totalSlides);
            }

            function startInterval() {
                slideInterval = setInterval(nextSlide, 5000);
            }

            function resetInterval() {
                clearInterval(slideInterval);
                startInterval();
            }

            startInterval();
        });
    </script>
</body>
</html>
